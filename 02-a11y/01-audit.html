<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 01 - Audit</title>
  </head>
  <body>
    <form>
      <label for="name">Name:</label><br />
      <input type="text" name="name" id="name" /><br /><br />
      <label for="address">Address:</label><br />
      <input type="text" name="address" id="address" />
      <br /><br />
      <label for="city">City: </label><br />
      <input type="text" name="city" id="city" />
      <br /><br />
      <label for="zip">Zip Code:</label><br />
      <input type="text" name="zip" id="zip" />
      <br /><br />
      <label for="card">Credit Card Type:</label> <br />
      <input type="radio" name="card" value="visa" /> Visa<br />
      <input type="radio" name="card" value="mastercard" /> MasterCard<br />
      <input type="radio" name="card" value="amex" /> American Express<br /><br />
      Credit Card Number:<br />
      <input type="text" name="cc_number" /><br /><br />
      CVC:<br />
      <input type="text" name="cvv" /><br /><br />
      <input type="button" value="Submit" />
    </form>
  </body>
</html>
